<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mishricky Medical – Front Desk</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0b1a2e;
    --blue-300: #5dade2;
    --blue-200: #85c1e9;
    --white: #ffffff;
    --grey: #8c8c8c;
    --font: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: var(--navy);
    font-family: var(--font);
    color: var(--white);
    cursor: none;
  }

  /* Force landscape */
  @media (orientation: portrait) {
    html {
      transform: rotate(90deg);
      transform-origin: top left;
      width: 100vh;
      height: 100vw;
      position: absolute;
      top: 0;
      left: 100%;
    }
  }

  .slideshow {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  .slide {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    opacity: 0;
    transition: opacity 1.2s ease;
    pointer-events: none;
  }

  .slide.active {
    opacity: 1;
    pointer-events: auto;
  }

  /* Header bar with brand - top LEFT */
  .header {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding: 2.5vh 3.5vw;
    flex-shrink: 0;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 0.5vw;
  }

  .brand img {
    height: 5.5vh;
    width: auto;
  }

  .brand-text {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
    letter-spacing: -0.02em;
  }

  .brand-text .name {
    font-weight: 700;
    font-size: 2.2vh;
    color: var(--white);
  }

  .brand-text .sub {
    font-weight: 500;
    font-size: 2.2vh;
    color: var(--blue-300);
  }

  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 8vw 4vh;
    text-align: center;
  }

  .icon-large {
    font-size: 16vh;
    margin-bottom: 3.5vh;
    opacity: 0.9;
  }

  .icon-img {
    height: 18vh;
    width: auto;
    margin-bottom: 3.5vh;
  }

  .title {
    font-weight: 700;
    font-size: 7.5vh;
    color: var(--white);
    margin-bottom: 2.5vh;
    line-height: 1.15;
  }

  .subtitle {
    font-weight: 400;
    font-size: 5vh;
    color: var(--blue-200);
    line-height: 1.5;
    max-width: 70vw;
  }

  /* Pricing */
  .price-main {
    font-weight: 700;
    font-size: 18vh;
    color: var(--white);
    line-height: 1;
    margin-bottom: 1vh;
  }

  .price-label {
    font-weight: 500;
    font-size: 4vh;
    color: var(--blue-200);
    margin-bottom: 4vh;
  }

  .price-breakdown {
    display: flex;
    align-items: center;
    gap: 2.5vw;
  }

  .price-breakdown .component {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5vh;
  }

  .price-breakdown .amount {
    font-weight: 700;
    font-size: 6.5vh;
    color: var(--white);
  }

  .price-breakdown .label {
    font-weight: 400;
    font-size: 3vh;
    color: var(--blue-300);
    opacity: 0.8;
  }

  .price-breakdown .plus {
    font-size: 5vh;
    color: var(--blue-300);
    opacity: 0.5;
    font-weight: 300;
  }

  .progress-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    height: 4px;
    background: var(--blue-300);
    transition: width 0.1s linear;
    z-index: 100;
  }

  .slide::before {
    content: '';
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 40vw;
    height: 40vw;
    background: radial-gradient(circle, rgba(93,173,226,0.05) 0%, transparent 70%);
    pointer-events: none;
    border-radius: 50%;
  }
</style>
</head>
<body>

<div class="slideshow" id="slideshow">

  <!-- Slide 1: Take A Seat -->
  <div class="slide active" data-duration="8000">
    <div class="header">
      <div class="brand">
        <img class="brandLogo" alt="MM">
        <div class="brand-text">
          <span class="name">Mishricky</span>
          <span class="sub">Medical</span>
        </div>
      </div>
    </div>
    <div class="content">
      <div class="icon-large">🪑</div>
      <div class="title">If No One Is At Reception,<br>Please Take A Seat</div>
      <div class="subtitle">A staff member will be with you shortly.</div>
    </div>
  </div>

  <!-- Slide 2: Consultation Pricing -->
  <div class="slide" data-duration="10000">
    <div class="header">
      <div class="brand">
        <img class="brandLogo" alt="MM">
        <div class="brand-text">
          <span class="name">Mishricky</span>
          <span class="sub">Medical</span>
        </div>
      </div>
    </div>
    <div class="content">
      <div class="price-label">Standard Consultation</div>
      <div class="price-main">$85</div>
      <div class="price-label" style="margin-bottom: 3.5vh;">Total Fee</div>
      <div class="price-breakdown">
        <div class="component">
          <span class="amount">$44</span>
          <span class="label">Medicare Rebate</span>
        </div>
        <span class="plus">+</span>
        <div class="component">
          <span class="amount">$41</span>
          <span class="label">Gap Payment</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Slide 3: Toilets -->
  <div class="slide" data-duration="8000">
    <div class="header">
      <div class="brand">
        <img class="brandLogo" alt="MM">
        <div class="brand-text">
          <span class="name">Mishricky</span>
          <span class="sub">Medical</span>
        </div>
      </div>
    </div>
    <div class="content">
      <img class="icon-img toiletIcon" alt="Toilet">
      <div class="title">Toilets</div>
      <div class="subtitle">Located immediately next door.</div>
    </div>
  </div>

</div>

  }

  function tick() {
    const elapsed = Date.now() - startTime;
    const duration = getDuration();
    const progress = Math.min(elapsed / duration, 1);
    progressBar.style.width = (progress * 100) + 'vw';
    if (elapsed >= duration) nextSlide();
    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);

  document.body.addEventListener('click', () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    }
  });
</script>
</body>
</html>
